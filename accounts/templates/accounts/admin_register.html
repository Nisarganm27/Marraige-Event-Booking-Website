{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Register</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
<div class="auth-container">
    <h2>Admin Register</h2>
    {% for message in messages %}<p class="msg">{{ message }}</p>{% endfor %}
    <form method="POST">
        {% csrf_token %}
        <div class="input-box">
            <label>Username</label>
            <input type="text" name="username" placeholder="Choose admin username" required>
        </div>
        <div class="input-box">
            <label>Email</label>
            <input type="email" name="email" placeholder="Admin email">
        </div>
        <div class="input-box">
            <label>Password</label>
            <input type="password" name="password" placeholder="Create password" required>
        </div>
        <div class="input-box">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm password" required>
        </div>
        <button type="submit" class="auth-btn">Register</button>
    </form>
    <p>Already have an account? <a href="{% url 'admin_login' %}">Login</a></p>
    <p style="font-size:12px; color:#64748b;">New admins are granted staff access for the app dashboard.</p>
</div>
</body>
</html>
