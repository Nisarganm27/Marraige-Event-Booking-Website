<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
    :root { --brand:#4b6cb7; --brandDark:#35518d; --bg:#eef2f7; --card:#ffffff; --text:#0f172a; --muted:#64748b; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, Arial, sans-serif; background:var(--bg); color:var(--text); }
    .topbar { position:sticky; top:0; background:linear-gradient(90deg, var(--brand), #6a82cf); color:#fff; padding:14px 18px; box-shadow:0 4px 12px rgba(0,0,0,.15); }
    .topbar .row { max-width:1100px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; }
    .brand { font-weight:800; font-size:22px; display:flex; align-items:center; gap:10px; }
    .action { display:flex; gap:10px; }
    .btn { display:inline-block; padding:10px 14px; border-radius:9px; text-decoration:none; font-weight:600; }
    .btn.bookings { background:#334155; color:#fff; }
    .btn.bookings:hover { background:#1f2937; }
    .btn.logout { background:#ef4444; color:#fff; }
    .btn.logout:hover { background:#dc2626; }
    .wrap { max-width:1100px; margin:0 auto; padding:18px; }
    .welcome { text-align:center; padding:10px; font-size:18px; color:var(--muted); }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:22px; padding:10px 0; }
    .card { background:var(--card); border-radius:16px; overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,.08); transition: transform .25s ease, box-shadow .25s ease; }
    .card:hover { transform: translateY(-6px); box-shadow:0 14px 34px rgba(0,0,0,.12); }
    .thumb {
    position: relative;
    width: 100%;
    height: 160px;          /* SAME height for all cards */
    overflow: hidden;
    border-radius: 16px 16px 0 0;
}

.thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;      /* key line */
    display: block;
    transition: transform .35s ease;
}

    .card:hover .thumb img { transform: scale(1.06); }
    .thumb::after { content:''; position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.35), rgba(0,0,0,0)); opacity:.4; }
    .content { padding:14px; display:flex; align-items:center; justify-content:space-between; }
    .title { font-weight:700; font-size:18px; display:flex; align-items:center; gap:10px; }
    .explore { background:var(--brand); color:#fff; padding:9px 12px; border-radius:10px; text-decoration:none; font-weight:600; transition:.2s ease; }
    .explore:hover { background:var(--brandDark); transform: translateY(-1px); }
    
</style>
</head>
<body>
<div class="topbar">
  <div class="row">
    <div class="brand">💍 Explore Services</div>
    <div class="action">
      <a class="btn bookings" href="{% url 'my_bookings' %}">My Bookings</a>
      <a class="btn logout" href="{% url 'logout' %}">Logout</a>
    </div>
  </div>
</div>
<div class="wrap">
  <p class="welcome">Welcome, <b>{{ request.user.username }}</b> 👋 • Choose a category to explore</p>
  <div class="grid">
    <div class="card">
      <div class="thumb"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT4Iuwji6wYhLkmOl_p0e2OEsDGmtOVw3V5cw&s" alt=""></div>
      <div class="content">
        <div class="title">🏛️ Halls</div>
        <a class="explore" href="{% url 'list_services' 'hall' %}">Explore</a>
      </div>
    </div>
    <div class="card">
      <div class="thumb"><img src="https://images.pexels.com/photos/262978/pexels-photo-262978.jpeg" alt=""></div>
      <div class="content">
        <div class="title">🍽️ Catering</div>
        <a class="explore" href="{% url 'list_services' 'catering' %}">Explore</a>
      </div>
    </div>
    <div class="card mehendi">
      <div class="thumb"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQsnu8mT0tPPWvybGPb9B8E94M3mUL2yzgDHg&s" alt="Bridal Mehendi hands"></div>
      <div class="content">
        <div class="title">💍 Mehandi</div>
        <a class="explore" href="{% url 'list_services' 'mehandi' %}">Explore</a>
      </div>
    </div>
    <div class="card">
      <div class="thumb"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQU03uX1snuCGbs29Z5Wj12E27_gdVJ4DxxHA&s" alt=""></div>
      <div class="content">
        <div class="title">🎉 Decoration</div>
        <a class="explore" href="{% url 'list_services' 'decoration' %}">Explore</a>
      </div>
    </div>
    <div class="card">
      <div class="thumb"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTs0v1b5EiSeTJgD68QtgCMgDvWMEuYq2Ny9Q&s" alt=""></div>
      <div class="content">
        <div class="title">📸 Photography</div>
        <a class="explore" href="{% url 'list_services' 'photography' %}">Explore</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
