<!DOCTYPE html>
<html>
<head>
    <title>Book a Service</title>
</head>
<body>
<h2>Book {{ service_type|title }}</h2>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    <label>Select Date:</label>
    <input type="date" name="booking_date" required>
    <br><br>
    <button type="submit">Confirm Booking</button>
</form>

</body>
</html>
